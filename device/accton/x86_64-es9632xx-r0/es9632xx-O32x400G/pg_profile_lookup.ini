# PG lossless profiles.
#
# Warning: profile is disabled!
#
# buffermgrd binds lossless priorities to ingress priority
# groups 3 and 4 that leads to issue with invalid ingress
# priority indexes when number of supported  ingress priority
# groups is less than 5
#
# When enabled buffermgrd uses this profile to create buffers
# configuration ignoring .j2 templates
#
# To enable profile uncomment lines below
#
# speed cable size      xon     xoff   threshold xon_offset
# 10000  5m   56368     18432   55120  -3        2496
# 25000  5m   56368     18432   55120  -3        2496
# 40000  5m   56368     18432   55120  -3        2496
# 50000  5m   56368     18432   55120  -3        2496
#100000  5m   56368     18432   55120  -3        2496
